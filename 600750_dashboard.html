    timeScale: { borderColor: '#e8e8e8', timeVisible: true },
    handleScroll: { vertTouchDrag: false }
  });
  var cs = chart.addCandlestickSeries({ upColor: '#dc3232', downColor: '#1ea050', borderUpColor: '#dc3232', borderDownColor: '#1ea050', wickUpColor: '#dc3232', wickDownColor: '#1ea050' });
  cs.setData(candleData);

  var vc = document.getElementById('volume-chart');
  var volChart = LightweightCharts.createChart(vc, {
    layout: { background: { type: 'solid', color: '#ffffff' }, textColor: '#888', fontSize: 10 },
    grid: { vertLines: { color: '#f0f0f0' }, horzLines: { color: '#f0f0f0' } },
    crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
    rightPriceScale: { borderColor: '#e8e8e8', scaleMargins: { top: 0.05, bottom: 0.05 } },
    timeScale: { borderColor: '#e8e8e8', visible: true, timeVisible: true },
    handleScroll: { vertTouchDrag: false }
  });
  var vs = volChart.addHistogramSeries({ priceFormat: { type: 'volume' }, priceScaleId: '' });
  vs.setData(volumeData);

  volChart.timeScale().subscribeVisibleTimeRangeChange(function(tr) { chart.timeScale().setVisibleRange(tr); });
  chart.timeScale().subscribeVisibleTimeRangeChange(function(tr) { volChart.timeScale().setVisibleRange(tr); });
  chart.subscribeCrosshairMove(function(p) { volChart.crossHairMoved(p); });
  volChart.subscribeCrosshairMove(function(p) { chart.crossHairMoved(p); });
  window.addEventListener('resize', function() { chart.resize(c.clientWidth, 480); volChart.resize(vc.clientWidth, 160); });
})();
</script>
</body>
</html>
