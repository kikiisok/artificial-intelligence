<script src="https://cdn.jsdelivr.net/npm/plotly.js-dist@2.35.2/plotly.min.js"></script>
<style>
:root {
  --bg: #1a1a2e;
  --panel: #16213e;
  --card: #0f3460;
  --text: #e0e0e0;
  --text-secondary: #a0a0b0;
  --accent: #e94560;
  --accent2: #26a69a;
  --accent3: #7c4dff;
  --gold: #ffd700;
  --border: #2a2a4a;
  --red-up: #ef5350;
  --green-down: #26a69a;
  --input-bg: #1a1a3e;
  --slider-track: #2a2a5a;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.6;
}
.header {
  background: linear-gradient(135deg, var(--panel), #1a1a40);
  padding: 24px 32px;
  border-bottom: 1px solid var(--border);
  text-align: center;
}
.header h1 { font-size: 1.6em; font-weight: 700; color: #fff; }
.header .subtitle { font-size: 0.9em; color: var(--text-secondary); margin-top: 4px; }
.container { max-width: 1400px; margin: 0 auto; padding: 20px 24px; }

/* Controls */
.controls {
  background: var(--panel);
  border-radius: 12px;
  padding: 20px 24px;
  margin-bottom: 20px;
  display: flex;
  flex-wrap: wrap;
  gap: 24px;
  align-items: flex-end;
  border: 1px solid var(--border);
}
.control-group { flex: 1; min-width: 200px; }
.control-group label {
  display: block;
  font-size: 0.85em;
  color: var(--text-secondary);
  margin-bottom: 6px;
  font-weight: 600;
}
.control-group .value-display {
  font-size: 1.1em;
  font-weight: 700;
  color: var(--accent3);
  margin-left: 4px;
}
.control-group input[type="range"] {
  width: 100%;
  height: 6px;
  -webkit-appearance: none;
  background: var(--slider-track);
  border-radius: 3px;
  outline: none;
}
.control-group input[type="range"]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 20px; height: 20px;
  border-radius: 50%;
  background: var(--accent3);
  cursor: pointer;
  border: 2px solid #fff;
}
.btn {
  background: var(--accent3);
  color: #fff;
  border: none;
  padding: 10px 28px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 0.95em;
  font-weight: 600;
  transition: all 0.2s;
  white-space: nowrap;
}
.btn:hover { background: #9c6dff; transform: translateY(-1px); }
.btn-reset { background: transparent; border: 1px solid var(--border); color: var(--text-secondary); }
.btn-reset:hover { background: var(--border); color: #fff; }

/* Dashboard cards */
.dashboard {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 12px;
  margin-bottom: 20px;
}
.metric-card {
  background: var(--panel);
  border-radius: 10px;
  padding: 16px 18px;
  border: 1px solid var(--border);
  text-align: center;
}
.metric-card .label { font-size: 0.78em; color: var(--text-secondary); margin-bottom: 4px; }
.metric-card .value { font-size: 1.5em; font-weight: 700; }
.metric-card .value.positive { color: var(--red-up); }
.metric-card .value.negative { color: var(--green-down); }
.metric-card .value.neutral { color: var(--accent3); }

/* Chart panels */
.chart-panel {
  background: var(--panel);
  border-radius: 12px;
  border: 1px solid var(--border);
  margin-bottom: 16px;
  overflow: hidden;
}
.chart-panel .chart-title {
  padding: 12px 20px;
  font-size: 0.9em;
  font-weight: 600;
  color: var(--text-secondary);
  border-bottom: 1px solid var(--border);
}
.chart-container { width: 100%; }

/* Loading */
.loading {
  display: flex; align-items: center; justify-content: center;
  padding: 60px; color: var(--text-secondary); font-size: 0.9em;
}
.loading::after {
  content: '';
  width: 20px; height: 20px;
  border: 2px solid var(--border);
  border-top-color: var(--accent3);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin-left: 12px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Trade log */
.trade-log {
  background: var(--panel);
  border-radius: 12px;
  border: 1px solid var(--border);
  padding: 16px 20px;
  margin-bottom: 20px;
  max-height: 260px;
  overflow-y: auto;
}
.trade-log h3 { font-size: 0.9em; color: var(--text-secondary); margin-bottom: 10px; }
.trade-log table { width: 100%; border-collapse: collapse; font-size: 0.82em; }
.trade-log th { color: var(--text-secondary); padding: 6px 10px; text-align: left; border-bottom: 1px solid var(--border); }
.trade-log td { padding: 5px 10px; border-bottom: 1px solid rgba(42,42,74,0.5); }
.trade-log .buy { color: var(--red-up); font-weight: 600; }
.trade-log .sell { color: var(--green-down); font-weight: 600; }
.trade-log .pnl-pos { color: var(--red-up); }
.trade-log .pnl-neg { color: var(--green-down); }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

.footer {
  text-align: center;
  padding: 20px;
  color: var(--text-secondary);
  font-size: 0.78em;
}
</style>
</head>

// ===== 解析CSV =====
function parseCSV(csv) {
  const lines = csv.trim().split('\n');
  const headers = lines[0].split(',');
  const data = [];
  for (let i = 1; i < lines.length; i++) {
    const values = lines[i].split(',');
    const row = {};
    headers.forEach((h, j) => {
      if (h === 'trade_date') row[h] = values[j];
      else if (h === 'ts_code') row[h] = values[j];
      else row[h] = parseFloat(values[j]);
    });
    data.push(row);
  }
  data.sort((a, b) => a.trade_date.localeCompare(b.trade_date));
  return data;
}

// ===== 计算函数 =====
function rollingMax(arr, period) {
  const res = new Array(arr.length).fill(null);
  for (let i = period - 1; i < arr.length; i++) {
    let mx = -Infinity;
    for (let j = i - period + 1; j <= i; j++) {
      if (arr[j] > mx) mx = arr[j];
    }
    res[i] = mx;
  }
  return res;
}

function rollingMin(arr, period) {
  const res = new Array(arr.length).fill(null);
  for (let i = period - 1; i < arr.length; i++) {
    let mn = Infinity;
    for (let j = i - period + 1; j <= i; j++) {
      if (arr[j] < mn) mn = arr[j];
    }
    res[i] = mn;
  }
  return res;
}

function rollingMean(arr, period) {
  const res = new Array(arr.length).fill(null);
  for (let i = period - 1; i < arr.length; i++) {
    let sum = 0;
    for (let j = i - period + 1; j <= i; j++) sum += arr[j];
    res[i] = sum / period;
  }
  return res;
}

function runBacktest() {
  const chPeriod = parseInt(document.getElementById('chPeriod').value);
  const atrPeriod = parseInt(document.getElementById('atrPeriod').value);
  const initCap = parseInt(document.getElementById('initCap').value);

  document.getElementById('chPeriodVal').textContent = chPeriod;
  document.getElementById('atrPeriodVal').textContent = atrPeriod;
  document.getElementById('initCapVal').textContent = initCap.toLocaleString();

  const validStart = Math.max(chPeriod, atrPeriod);

  // 1. 价格通道
  const upperChannel = rollingMax(highs, chPeriod);
  const lowerChannel = rollingMin(lows, chPeriod);
  const midChannel = new Array(N).fill(null);
  const channelWidth = new Array(N).fill(null);
  for (let i = 0; i < N; i++) {
    if (upperChannel[i] !== null && lowerChannel[i] !== null) {
      midChannel[i] = (upperChannel[i] + lowerChannel[i]) / 2;
      channelWidth[i] = upperChannel[i] - lowerChannel[i];
    }
  }

  // 2. ATR
  const tr = new Array(N).fill(null);
  for (let i = 0; i < N; i++) {
    if (i === 0) {
      tr[i] = highs[i] - lows[i];
    } else {
      tr[i] = Math.max(
        highs[i] - lows[i],
        Math.abs(highs[i] - closes[i - 1]),
        Math.abs(lows[i] - closes[i - 1])
      );
    }
  }
  const atr = rollingMean(tr, atrPeriod);

  // 3. 交易信号（交叉确认）
  const signals = new Array(N).fill(0);
  for (let i = validStart + 1; i < N; i++) {
    if (upperChannel[i] === null || lowerChannel[i] === null) continue;
    // 买入：前日收盘 <= 前日中轨，当日收盘 > 当日中轨（向上突破中轨=转多）
    if (closes[i - 1] <= midChannel[i - 1] && closes[i] > midChannel[i]) {
      signals[i] = 1;
    }
    // 卖出：前日收盘 >= 前日中轨，当日收盘 < 当日中轨（向下突破中轨=转空）
    if (closes[i - 1] >= midChannel[i - 1] && closes[i] < midChannel[i]) {
      signals[i] = -1;
    }
  }

  // 4. 回测
  let capital = initCap;
  let shares = 0;
  const portfolioValues = new Array(N).fill(initCap);
  const dailyReturns = new Array(N).fill(0);
  const trades = [];
  let entryPrice = 0;
  let entryDate = '';

  for (let i = 0; i < N; i++) {
    const price = closes[i];
    if (i >= validStart) {
      if (signals[i] === 1 && capital > 0) {
        shares = capital / price;
        entryPrice = price;
        entryDate = dates[i];
        capital = 0;
        trades.push({ date: dates[i], type: 'BUY', price, shares });
      } else if (signals[i] === -1 && shares > 0) {
        capital = shares * price;
        const pnlPct = (price - entryPrice) / entryPrice * 100;
        trades.push({ date: dates[i], type: 'SELL', price, shares, pnlPct });
        shares = 0;
      }
    }
    portfolioValues[i] = capital + shares * price;
    if (i > 0) {
      dailyReturns[i] = (portfolioValues[i] - portfolioValues[i - 1]) / portfolioValues[i - 1];
    }
  }

  // 如果最后还持仓
  if (shares > 0) {
    const finalPnl = (closes[N - 1] - entryPrice) / entryPrice * 100;
    trades.push({ date: dates[N - 1], type: 'CLOSE', price: closes[N - 1], shares, pnlPct: finalPnl });
    portfolioValues[N - 1] = shares * closes[N - 1];
  }

  // 5. 量化指标
  const totalReturn = (portfolioValues[N - 1] - initCap) / initCap;
  const daySpan = (new Date(dates[N - 1].replace(/(\d{4})(\d{2})(\d{2})/, '$1-$2-$3')) -
                    new Date(dates[0].replace(/(\d{4})(\d{2})(\d{2})/, '$1-$2-$3'))) /
                   (1000 * 60 * 60 * 24);
  const years = Math.max(daySpan / 365.25, 0.01);
  const cagr = Math.pow(portfolioValues[N - 1] / initCap, 1 / years) - 1;
  const bhCagr = Math.pow(closes[N - 1] / closes[0], 1 / years) - 1;
  const alpha = cagr - bhCagr;

  // 最大回撤
  let peak = portfolioValues[0];
  let maxDD = 0;
  let mddStart = dates[0], mddEnd = dates[0];
  let tempPeak = portfolioValues[0];
  let tempPeakDate = dates[0];
  const drawdowns = new Array(N).fill(0);
  for (let i = 1; i < N; i++) {
    if (portfolioValues[i] > tempPeak) {
      tempPeak = portfolioValues[i];
      tempPeakDate = dates[i];
    }
    const dd = (tempPeak - portfolioValues[i]) / tempPeak;
    drawdowns[i] = dd * 100;
    if (dd > maxDD) {
      maxDD = dd;
      mddStart = tempPeakDate;
      mddEnd = dates[i];
    }
  }

  // 日胜率 & 夏普
  const validRets = dailyReturns.slice(validStart);
  const winRate = validRets.filter(r => r > 0).length / validRets.length;
  const posRets = validRets.filter(r => r > 0);
  const negRets = validRets.filter(r => r < 0);
  const avgProfit = posRets.length > 0 ? posRets.reduce((a, b) => a + b, 0) / posRets.length : 0;
  const avgLoss = negRets.length > 0 ? Math.abs(negRets.reduce((a, b) => a + b, 0) / negRets.length) : 0;
  const plRatio = avgLoss > 0 ? avgProfit / avgLoss : Infinity;
  const retMean = validRets.reduce((a, b) => a + b, 0) / validRets.length;
  const retVar = validRets.reduce((a, b) => a + Math.pow(b - retMean, 2), 0) / validRets.length;
  const retStd = Math.sqrt(retVar);
  const annualRet = retMean * 252;
  const annualStd = retStd * Math.sqrt(252);
  const sharpe = annualStd > 0 ? (annualRet - 0.015) / annualStd : 0;

  // 按笔统计
  const closedTrades = trades.filter(t => t.type === 'SELL' || t.type === 'CLOSE');
  const tradeCount = closedTrades.length;
  const tradePnls = closedTrades.map(t => t.pnlPct || 0);
  const tradeWinRate = tradePnls.filter(p => p > 0).length / tradePnls.length;
  const totalTradePnL = tradePnls.reduce((a, b) => a + b, 0);

  const buyCnt = signals.filter(s => s === 1).length;
  const sellCnt = signals.filter(s => s === -1).length;
  const position = new Array(N).fill(0);
  let inPos = false;
  for (let i = 0; i < N; i++) {
    if (signals[i] === 1) inPos = true;
    else if (signals[i] === -1) inPos = false;
    position[i] = inPos ? 1 : 0;
  }
  const holdPct = position.reduce((a, b) => a + b, 0) / N * 100;

  // ===== 更新仪表盘 =====
  const formatPct = v => (v * 100).toFixed(2) + '%';
  const cls = v => v >= 0 ? 'positive' : 'negative';
  document.getElementById('dashboard').innerHTML = `
    <div class="metric-card"><div class="label">总收益率</div><div class="value ${cls(totalReturn)}">${(totalReturn * 100).toFixed(2)}%</div></div>
    <div class="metric-card"><div class="label">年化收益率</div><div class="value ${cls(cagr)}">${(cagr * 100).toFixed(2)}%</div></div>
    <div class="metric-card"><div class="label">超额收益 α</div><div class="value ${cls(alpha)}">${(alpha * 100).toFixed(2)}%</div></div>
    <div class="metric-card"><div class="label">最大回撤</div><div class="value negative">${(maxDD * 100).toFixed(2)}%</div></div>
    <div class="metric-card"><div class="label">夏普比率</div><div class="value neutral">${sharpe.toFixed(2)}</div></div>
    <div class="metric-card"><div class="label">日胜率</div><div class="value ${cls(winRate - 0.5)}">${(winRate * 100).toFixed(1)}%</div></div>
    <div class="metric-card"><div class="label">盈亏比</div><div class="value neutral">${plRatio === Infinity ? '∞' : plRatio.toFixed(2)}</div></div>
    <div class="metric-card"><div class="label">笔胜率</div><div class="value ${cls(tradeWinRate - 0.5)}">${(tradeWinRate * 100).toFixed(1)}%</div></div>
    <div class="metric-card"><div class="label">交易次数</div><div class="value neutral">${tradeCount}</div></div>
    <div class="metric-card"><div class="label">年化波动率</div><div class="value neutral">${(annualStd * 100).toFixed(1)}%</div></div>
    <div class="metric-card"><div class="label">持仓占比</div><div class="value neutral">${holdPct.toFixed(1)}%</div></div>
    <div class="metric-card"><div class="label">买入/卖出</div><div class="value neutral">${buyCnt}/${sellCnt}</div></div>
  `;

  // ===== 更新交易记录 =====
  let tradeHTML = '<h3>交易明细</h3><table><thead><tr><th>#</th><th>日期</th><th>类型</th><th>价格</th><th>股数</th><th>盈亏</th></tr></thead><tbody>';
  trades.forEach((t, i) => {
    const dateStr = t.date.replace(/(\d{4})(\d{2})(\d{2})/, '$1-$2-$3');
    const typeClass = t.type === 'BUY' ? 'buy' : 'sell';
    const typeLabel = t.type === 'BUY' ? '买入' : (t.type === 'CLOSE' ? '清仓' : '卖出');
    const pnlStr = t.pnlPct !== undefined
      ? `<span class="${t.pnlPct >= 0 ? 'pnl-pos' : 'pnl-neg'}">${t.pnlPct >= 0 ? '+' : ''}${t.pnlPct.toFixed(2)}%</span>`
      : '-';
    tradeHTML += `<tr><td>${i + 1}</td><td>${dateStr}</td><td class="${typeClass}">${typeLabel}</td><td>¥${t.price.toFixed(2)}</td><td>${t.shares.toFixed(0)}</td><td>${pnlStr}</td></tr>`;
  });
  tradeHTML += '</tbody></table>';
  document.getElementById('tradeLog').innerHTML = tradeHTML;

  // ===== 图表1: K线 + 通道 + 信号 =====
  const candlestick = {
    x: dates, open: opens, high: highs, low: lows, close: closes,
    type: 'candlestick', name: 'K线',
    increasing: { line: { color: '#ef5350' }, fillcolor: '#ef5350' },
    decreasing: { line: { color: '#26a69a' }, fillcolor: '#26a69a' },
    showlegend: true, hoverinfo: 'x+text',
    hovertext: dates.map((d, i) => {
      const ds = d.replace(/(\d{4})(\d{2})(\d{2})/, '$1-$2-$3');
      return `${ds}<br>O:${opens[i]} H:${highs[i]} L:${lows[i]} C:${closes[i]}`;
    })
  };

  const upperTrace = {
    x: dates, y: upperChannel, type: 'scatter', mode: 'lines',
    line: { color: '#ef5350', width: 1.5, dash: 'dash' },
    name: '上轨 (Upper)'
  };
  const lowerTrace = {
    x: dates, y: lowerChannel, type: 'scatter', mode: 'lines',
    line: { color: '#26a69a', width: 1.5, dash: 'dash' },
    name: '下轨 (Lower)',
    fill: 'tonexty', fillcolor: 'rgba(128,128,128,0.08)'
  };
  const midTrace = {
    x: dates, y: midChannel, type: 'scatter', mode: 'lines',
    line: { color: 'rgba(158,158,158,0.5)', width: 1 },
    name: '中轨 (Mid)'
  };

  const buyDates = [], buyYs = [], sellDates = [], sellYs = [];
  for (let i = 0; i < N; i++) {
    if (signals[i] === 1) {
      buyDates.push(dates[i]);
      buyYs.push(lows[i] * 0.98);
    } else if (signals[i] === -1) {
      sellDates.push(dates[i]);
      sellYs.push(highs[i] * 1.02);
    }
  }
  const buyTrace = {
    x: buyDates, y: buyYs, type: 'scatter', mode: 'markers+text',
    marker: { symbol: 'triangle-up', size: 14, color: '#ef5350', line: { width: 1, color: '#fff' } },
    text: buyDates.map(() => '买入'),
    textposition: 'bottom center',
    textfont: { size: 9, color: '#ef5350' },
    name: '买入信号'
  };
  const sellTrace = {
    x: sellDates, y: sellYs, type: 'scatter', mode: 'markers+text',
    marker: { symbol: 'triangle-down', size: 14, color: '#26a69a', line: { width: 1, color: '#fff' } },
    text: sellDates.map(() => '卖出'),
    textposition: 'top center',
    textfont: { size: 9, color: '#26a69a' },
    name: '卖出信号'
  };

  const layout1 = {
    title: {
      text: `华润江中 600750 — 价格通道(${chPeriod}日) + ATR(${atrPeriod}日) 策略<br><sup>买入 ${buyCnt} 次 | 卖出 ${sellCnt} 次 | 总收益 ${(totalReturn * 100).toFixed(2)}%</sup>`,
      font: { size: 14, color: '#e0e0e0' }
    },
    xaxis: {
      rangeslider: { visible: false },
      rangeselector: {
        buttons: [
          { count: 1, label: '1月', step: 'month', stepmode: 'backward' },
          { count: 3, label: '3月', step: 'month', stepmode: 'backward' },
          { count: 6, label: '6月', step: 'month', stepmode: 'backward' },
          { step: 'all', label: '全部' }
        ]
      },
      gridcolor: '#2a2a4a', color: '#a0a0b0'
    },
    yaxis: { title: '价格 (¥)', gridcolor: '#2a2a4a', color: '#a0a0b0' },
    hovermode: 'x unified',
    legend: { orientation: 'h', yanchor: 'bottom', y: 1.02, xanchor: 'center', x: 0.5, font: { color: '#a0a0b0' } },
    template: 'plotly_dark',
    paper_bgcolor: '#16213e', plot_bgcolor: '#16213e',
    height: 500, margin: { l: 60, r: 30, t: 60, b: 40 }
  };

  Plotly.newPlot('chart1', [candlestick, upperTrace, lowerTrace, midTrace, buyTrace, sellTrace], layout1, { responsive: true, displayModeBar: true, modeBarButtonsToRemove: ['lasso2d', 'select2d'] });

  // ===== 图表2: ATR =====
  const atrTrace = {
    x: dates, y: atr, type: 'scatter', mode: 'lines',
    line: { color: '#ff9800', width: 1.5 },
    fill: 'tozeroy', fillcolor: 'rgba(255,152,0,0.1)',
    name: `ATR(${atrPeriod})`
  };
  const layout2 = {
    xaxis: { gridcolor: '#2a2a4a', color: '#a0a0b0' },
    yaxis: { title: 'ATR (¥)', gridcolor: '#2a2a4a', color: '#a0a0b0' },
    hovermode: 'x unified',
    template: 'plotly_dark',
    paper_bgcolor: '#16213e', plot_bgcolor: '#16213e',
    height: 200, margin: { l: 60, r: 30, t: 20, b: 40 }
  };
  Plotly.newPlot('chart2', [atrTrace], layout2, { responsive: true, displayModeBar: false });

  // ===== 图表3: 资金曲线 + 回撤 =====
  const pvTrace = {
    x: dates, y: portfolioValues, type: 'scatter', mode: 'lines',
    line: { color: '#7c4dff', width: 2 },
    fill: 'tozeroy', fillcolor: 'rgba(124,77,255,0.06)',
    name: '策略净值'
  };
  const ddTrace = {
    x: dates, y: drawdowns, type: 'scatter', mode: 'lines',
    line: { color: 'rgba(244,67,54,0.4)', width: 1 },
    fill: 'tozeroy', fillcolor: 'rgba(244,67,54,0.08)',
    name: '回撤 %',
    yaxis: 'y2'
  };
  const layout3 = {
    xaxis: { gridcolor: '#2a2a4a', color: '#a0a0b0' },
    yaxis: { title: '净值 (¥)', gridcolor: '#2a2a4a', color: '#a0a0b0' },
    yaxis2: {
      title: '回撤 %', overlaying: 'y', side: 'right',
      gridcolor: '#2a2a4a', color: 'rgba(244,67,54,0.7)',
      tickformat: '.1f'
    },
    shapes: [{
      type: 'line', x0: dates[0], x1: dates[N - 1],
      y0: initCap, y1: initCap,
      line: { dash: 'dot', color: 'rgba(128,128,128,0.4)' },
      yref: 'y'
    }],
    hovermode: 'x unified',
    legend: { orientation: 'h', yanchor: 'bottom', y: 1.02, xanchor: 'center', x: 0.5, font: { color: '#a0a0b0' } },
    template: 'plotly_dark',
    paper_bgcolor: '#16213e', plot_bgcolor: '#16213e',
    height: 350, margin: { l: 60, r: 60, t: 20, b: 40 }
  };
  Plotly.newPlot('chart3', [pvTrace, ddTrace], layout3, { responsive: true, displayModeBar: false });
}

function resetParams() {
  document.getElementById('chPeriod').value = 20;
  document.getElementById('atrPeriod').value = 14;
  document.getElementById('initCap').value = 100000;
  runBacktest();
}

// 滑块实时更新
document.getElementById('chPeriod').addEventListener('input', function() {
  document.getElementById('chPeriodVal').textContent = this.value;
});
document.getElementById('atrPeriod').addEventListener('input', function() {
  document.getElementById('atrPeriodVal').textContent = this.value;
});
document.getElementById('initCap').addEventListener('input', function() {
  document.getElementById('initCapVal').textContent = parseInt(this.value).toLocaleString();
});

// 初始运行 - 确保 Plotly 已加载
if (typeof Plotly !== 'undefined') {
  runBacktest();
} else {
  document.addEventListener('DOMContentLoaded', function() {
    setTimeout(runBacktest, 500);
  });
  // Fallback
  window.onload = function() {
    if (typeof Plotly !== 'undefined') runBacktest();
  };
}
</script>
</body>
